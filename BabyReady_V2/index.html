function buildDelivery(){
  if(!S.profile?.due_date){ const e=mk('div','sub'); e.textContent='לא הוגדר תאריך לידה — עדכן בהגדרות'; return e; }
  const due = new Date(S.profile.due_date);
  const now = new Date();
  
  const startDate = new Date(due); startDate.setMonth(startDate.getMonth() - 5); startDate.setDate(1);
  const endDate = new Date(due); endDate.setMonth(endDate.getMonth() + 2);
  const totalDays = (endDate - startDate) / 86400000;
  
  const getPct = d => ((new Date(d) - startDate) / 86400000) / totalDays * 100;
  
  const frag = document.createDocumentFragment();
  const dh = mk('div'); dh.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px';
  dh.innerHTML = `<h3 style="margin:0">🚚 זמני משלוח</h3>`;
  frag.append(dh);
  
  const items = S.items.filter(p => (p.is_ordered || p.purchased));
  if(!items.length) {
    const e = mk('div','empty'); e.innerHTML='<div style="font-size:48px">📦</div><p>אין משלוחים פעילים. העבירו פריטים מהסל (מחשבון עלויות) לכאן!</p>';
    frag.append(e); return frag;
  }

  if(window.innerWidth <= 680) {
    const fbar = mk('div', 'fbar');
    fbar.style.cssText = 'padding:6px;justify-content:center;gap:10px;margin-bottom:15px';
    [['all','📦 הכל'],['pending','⏳ בדרך'],['done','✅ הגיע']].forEach(([v,l])=>{
      const p = mk('div', 'pill-del' + (S.filterDel === v ? ' on' : ''));
      p.textContent = l;
      p.onclick = () => { S.filterDel = v; renderMain(); };
      fbar.append(p);
    });
    frag.append(fbar);
    
    let filtered = items;
    if(S.filterDel === 'pending') filtered = items.filter(i => !i.purchased);
    if(S.filterDel === 'done') filtered = items.filter(i => i.purchased);

    const list = mk('div');
    list.style.cssText = 'display:flex;flex-direction:column;gap:16px;margin-top:10px';
    
    filtered.sort((a,b) => new Date(a.created_at) - new Date(b.created_at)).forEach(p => {
      const cat = getCat(p.category_id);
      const evalInfo = S.evalCart.find(e => e.user_item_id === p.id);
      const storeName = evalInfo ? (STORES[evalInfo.selected_store_id]?.name || evalInfo.selected_store_id) : 'הוזמן';
      const name = p.product_models ? (p.product_models.brands?.name + ' ' + p.product_models.model_name) : (p.custom_name || cat.he);

      const card = mk('div', 'card');
      card.style.padding = '16px';
      card.style.animation = 'item-in .2s ease';
      
      const top = mk('div'); top.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px';
      
      const info = mk('div');
      info.innerHTML = `<div style="font-size:15px;font-weight:800">${cat.icon} ${name}</div>
                        <div style="font-size:12px;color:var(--t2);font-weight:600">${storeName}</div>`;
      
      const del = mkBtn('🗑️', 'bg bsm', async () => {
        if(!confirm('להסיר?')) return;
        await sb.from('user_items').update({ is_ordered: false, purchased: false }).eq('id', p.id);
        await loadItems(); renderDash();
      });
      top.append(info, del);
      
      const ctrls = mk('div'); ctrls.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px';
      
      const ordGrp = mk('div');
      ordGrp.innerHTML = `<div class="label-sm" style="margin-bottom:4px">הוזמן ב-</div>`;
      const ordInp = mk('input'); ordInp.type = 'date'; ordInp.value = p.ordered_at || '';
      ordInp.onchange = async () => { 
        await sb.from('user_items').update({ ordered_at: ordInp.value }).eq('id', p.id); 
        p.ordered_at = ordInp.value; renderDash();
      };
      ordGrp.append(ordInp);

      const devGrp = mk('div');
      devGrp.innerHTML = `<div class="label-sm" style="margin-bottom:4px">צפי הגעה</div>`;
      const devInp = mk('input'); devInp.type = 'date'; devInp.value = p.estimated_delivery_date || '';
      devInp.onchange = async () => { 
        await sb.from('user_items').update({ estimated_delivery_date: devInp.value }).eq('id', p.id);
        p.estimated_delivery_date = devInp.value; renderDash();
      };
      devGrp.append(devInp);
      ctrls.append(ordGrp, devGrp);

      const timelineWrap = mk('div'); 
      timelineWrap.style.cssText = 'position:relative;height:35px;background:var(--s2);border-radius:18px;margin-bottom:12px;overflow:hidden;border:1px solid var(--brd);display:flex;align-items:center;justify-content:center';
      
      const dueMarker = mk('div'); dueMarker.style.cssText = `position:absolute;top:0;bottom:0;width:2.5px;background:rgba(255,0,0,0.5);z-index:2;right:${getPct(due)}%`;

      const bar = mk('div', 'gb-bar' + (p.purchased ? '' : ' pending'));
      bar.style.height = '100%'; bar.style.borderRadius = '0'; bar.style.position = 'absolute'; bar.style.right = '0';
      
      if(p.purchased) {
        bar.style.width = '100%';
        bar.style.background = '#81c784'; // Premium Light Green
        bar.style.zIndex = '3';
        bar.innerHTML = `<span style="font-size:13px;font-weight:900;color:#fff;letter-spacing:0.5px">Delivered - התקבל</span>`;
        timelineWrap.append(bar);
      } else {
        const orderDate = p.ordered_at ? new Date(p.ordered_at) : new Date(p.created_at);
        const deliveryDate = p.estimated_delivery_date ? new Date(p.estimated_delivery_date) : null;
        
        // Progress: Absolute width on the 5-month timeline starting from 0% (right)
        bar.style.width = getPct(now) + '%';
        bar.style.zIndex = '1';
        
        if(deliveryDate) {
          // Delivery marker (The target point) - small indicator next to target
          const dMarker = mk('div');
          const dPct = getPct(deliveryDate);
          dMarker.style.cssText = `position:absolute;top:0;bottom:0;width:2.5px;background:var(--grn);opacity:0.4;z-index:2;right:${dPct}%`;
          
          const dText = mk('div');
          dText.style.cssText = `position:absolute;bottom:-1px;right:${dPct}%;margin-right:4px;font-size:9px;font-weight:900;color:var(--grn);white-space:nowrap;z-index:4`;
          dText.innerHTML = `${deliveryDate.getDate()}.${deliveryDate.getMonth()+1}`;
          
          timelineWrap.append(dMarker, dText);
        }
        timelineWrap.append(dueMarker, bar);
      }

      const recBtn = mkBtn(p.purchased ? '↺' : '✓ הפריט התקבל', p.purchased ? 'bs bfw' : 'bp bfw', async () => {
        const newState = !p.purchased;
        await sb.from('user_items').update({ purchased: newState, purchased_at: newState ? new Date().toISOString() : null }).eq('id', p.id);
        p.purchased = newState; renderDash();
      });

      card.append(top);
      if(!p.purchased) {
        card.append(ctrls);
        if (p.estimated_delivery_date) {
          const dDiff = Math.round((new Date(p.estimated_delivery_date) - now) / 86400000);
          const statusRow = mk('div');
          statusRow.style.cssText = 'text-align:center;margin-bottom:10px;font-size:13px;font-weight:800;color:#4c4a45;animation:item-in .3s ease';
          statusRow.innerHTML = `${dDiff} ימים 🚚`;
          card.append(statusRow);
        }
      }
      card.append(timelineWrap, recBtn);
      list.append(card);
    });
    
    frag.append(list);
  } else {
    const root = mk('div', 'gantt-root');
    const side = mk('div', 'gantt-side');
    const sh = mk('div', 'gantt-row gantt-h-row');
    sh.innerHTML = `<div class="gs-cell" style="font-weight:800;font-size:11px;color:var(--t2)">פריטים וניהול הגעה</div>`;
    side.append(sh);
    
    const main = mk('div', 'gantt-main');
    const th = mk('div', 'gantt-row gantt-h-row');
    th.style.width = (totalDays * 5) + 'px'; 
    
    for(let d = new Date(startDate); d <= endDate; d.setMonth(d.getMonth() + 1)) {
      const mCell = mk('div', 'gt-cell');
      mCell.innerHTML = `<div class="gt-month-lbl">${d.toLocaleDateString('he-IL',{month:'long',year:'2-digit'})}</div>`;
      th.append(mCell);
    }
    main.append(th);
    
    items.sort((a,b) => new Date(a.created_at) - new Date(b.created_at)).forEach(p => {
      const cat = getCat(p.category_id);
      const evalInfo = S.evalCart.find(e => e.user_item_id === p.id);
      const storeName = evalInfo ? (STORES[evalInfo.selected_store_id]?.name || evalInfo.selected_store_id) : 'הוזמן';
      
      // Sidebar Cell
      const sRow = mk('div', 'gantt-row' + (p.purchased ? ' is-purchased' : ''));
      const sCell = mk('div', 'gs-cell');
      
      const top = mk('div', 'gs-info');
      const del = mk('div', 'gs-del'); del.innerHTML = '🗑️';
      del.onclick = async () => {
        if(!confirm('להסיר פריט זה מרשימת המשלוחים?')) return;
        await sb.from('user_items').update({ is_ordered: false, purchased: false }).eq('id', p.id);
        await loadItems(); renderDash();
      };
      const name = p.product_models ? (p.product_models.brands?.name + ' ' + p.product_models.model_name) : (p.custom_name || cat.he);
      top.innerHTML = `<div class="gs-name" title="${name}">${cat.icon} ${name}</div>
                        <div class="gs-sub">${storeName}</div>`;
      top.prepend(del);
      
      const ctrls = mk('div', 'gs-ctrls');
      
      const ordGrp = mk('div'); ordGrp.style.cssText='display:flex;flex-direction:column;gap:1px;flex:1';
      const ordLbl = mk('div'); ordLbl.textContent='תאריך הזמנה:'; ordLbl.style.fontSize='8px'; ordLbl.style.color='var(--t3)';
      const ordInp = mk('input', 'gs-date-inp'); ordInp.type = 'date'; ordInp.value = p.ordered_at || '';
      ordInp.onchange = async () => {
        await sb.from('user_items').update({ ordered_at: ordInp.value }).eq('id', p.id);
        p.ordered_at = ordInp.value; renderDash();
      };
      ordGrp.append(ordLbl, ordInp);

      const devGrp = mk('div'); devGrp.style.cssText='display:flex;flex-direction:column;gap:1px;flex:1';
      const devLbl = mk('div'); devLbl.textContent='צפי הגעה:'; devLbl.style.fontSize='8px'; devLbl.style.color='var(--t3)';
      const devInp = mk('input', 'gs-date-inp'); devInp.type = 'date'; devInp.value = p.estimated_delivery_date || '';
      devInp.onchange = async () => {
        await sb.from('user_items').update({ estimated_delivery_date: devInp.value }).eq('id', p.id);
        p.estimated_delivery_date = devInp.value; renderDash();
      };
      devGrp.append(devLbl, devInp);
      
      const recBtn = mkBtn('✓', 'bp bsm bico', async () => {
        if(!confirm('האם הפריט התקבל?')) return;
        await sb.from('user_items').update({ purchased: true, purchased_at: new Date().toISOString() }).eq('id', p.id);
        p.purchased = true; renderDash();
      });
      
      if(p.purchased) {
        recBtn.innerHTML = '↺'; recBtn.title = 'בטל סימון כהתקבל'; recBtn.className = 'btn bg bsm bico';
        recBtn.onclick = async () => {
          if(!confirm('לבטל סימון כהתקבל?')) return;
          await sb.from('user_items').update({ purchased: false, purchased_at: null }).eq('id', p.id);
          p.purchased = false; renderDash();
        };
      } else {
        recBtn.title = 'סמן כהתקבל';
      }

      ctrls.append(ordGrp, devGrp, recBtn);
      sCell.append(top, ctrls);
      sRow.append(sCell);
      side.append(sRow);
      
      // Timeline Row
      const tRow = mk('div', 'gantt-row' + (p.purchased ? ' is-purchased' : ''));
      tRow.style.width = th.style.width;
      const barArea = mk('div', 'gt-cell');
      barArea.style.flex = '1'; barArea.style.border = 'none';
      
      if(p.purchased) {
        const lbl = mk('div'); lbl.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:900;color:rgba(76,175,80,0.25);letter-spacing:5px;pointer-events:none;white-space:nowrap';
        lbl.textContent = 'התקבל • DELIVERED';
        barArea.append(lbl);
      }

      const todayMarker = mk('div', 'gb-today-line'); todayMarker.style.right = getPct(now) + '%';
      const dueMarker = mk('div', 'gb-due-line'); dueMarker.style.right = getPct(due) + '%';
      barArea.append(todayMarker, dueMarker);

      const orderDate = p.ordered_at ? new Date(p.ordered_at) : new Date(p.created_at);
      const deliveryDate = p.estimated_delivery_date ? new Date(p.estimated_delivery_date) : null;
      
      const barRight = getPct(orderDate);
      const barEnd = p.purchased ? getPct(new Date(p.purchased_at)) : (deliveryDate ? getPct(deliveryDate) : getPct(now));
      const barWidth = Math.max(3, Math.abs(barEnd - barRight));
      
      if(!p.purchased) {
        const bar = mk('div', 'gb-bar pending');
        bar.style.right = Math.min(barRight, barEnd) + '%'; 
        bar.style.width = barWidth + '%';
      
        if(deliveryDate) bar.innerHTML = `🚚 צפי: ${deliveryDate.toLocaleDateString('he-IL',{month:'numeric',day:'numeric'})}`;
        else bar.innerHTML = `⏳ בדרך`;
        barArea.append(bar);
      }
      tRow.append(barArea);
      main.append(tRow);
    });
    
    root.append(main, side); 
    frag.append(root);
  }
  
  return frag;
}

/* ═══════════════════════════════════════════════
   מחשבון עלויות
   ═══════════════════════════════════════════════ */
function buildEvaluationTab(){
  const frag = document.createDocumentFragment();
  const layout = mk('div', 'eval-layout');
  
  // ─── Sidebar: My Items & Summary ───
  const sidebar = mk('div', 'eval-sidebar');
  
  // New Summary Card (Calculated dynamically in refreshCart)
  const summaryCard = mk('div', 'eval-summary-card');
  summaryCard.innerHTML = `
    <div class="eval-summary-title">סיכום סל משוער</div>
    <div class="eval-summary-row">
      <span class="eval-total-label">סה"כ לתשלום</span>
      <div id="eval-total" class="eval-summary-val">₪0</div>
    </div>
    <div id="eval-total-save" class="eval-summary-save"></div>
  `;
  sidebar.append(summaryCard);

  const sbHdr = mk('div', 'eval-hdr');
  sbHdr.innerHTML = '<b>הציוד שלי</b> <span style="font-size:11px;color:var(--t2)">גרור מוצרים למרכז</span>';
  
  const list = mk('div', 'eval-list');
  const inCartIds = S.evalCart.map(e => e.user_item_id);
  const availableItems = S.items.filter(i => !inCartIds.includes(i.id));
  
  if(availableItems.length === 0 && S.items.length > 0) {
    const msg = mk('div', 'empty'); msg.style.padding = '20px'; msg.textContent = 'כל המוצרים כבר במחשבון';
    list.append(msg);
  } else if(S.items.length === 0) {
    const msg = mk('div', 'empty'); msg.style.padding = '20px'; msg.textContent = 'אין לך מוצרים ברשימה';
    list.append(msg);
  } else {
    // Group available items by category
    const grouped = {};
    availableItems.forEach(item => {
      const catId = item.category_id;
      if(!grouped[catId]) grouped[catId] = { cat: getCat(catId), items: [] };
      grouped[catId].items.push(item);
    });

    // Render grouped accordion
    Object.values(grouped).forEach(group => {
      const gBox = mk('div', 'eval-cat-group');
      const gHdr = mk('div', 'eval-cat-header');
      const gTitle = mk('div'); gTitle.textContent = (group.cat.icon||'📦') + ' ' + (group.cat.he || group.cat.id);
      const gCount = mk('span'); gCount.style.cssText = 'font-size:10px;opacity:0.6;margin-right:4px'; gCount.textContent = `(${group.items.length})`;
      const gChev = mk('span', 'eval-cat-chev'); gChev.textContent = '▼';
      gHdr.append(gTitle, gCount, gChev);
      
      const gBody = mk('div', 'eval-cat-body');
      group.items.forEach(item => {
        const card = mk('div', 'eval-card');
        card.draggable = true;
        card.dataset.id = item.id;
        const name = item.product_models ? (item.product_models.brands?.name + ' ' + item.product_models.model_name) : (item.custom_name || group.cat.he);
        card.innerHTML = `<div style="font-weight:700">${name}</div>`;
        
        card.ondragstart = e => {
          e.dataTransfer.setData('text/plain', item.id);
          card.classList.add('dragging');
        };
        card.ondragend = () => card.classList.remove('dragging');
        
        // Instant addition on tap/click for mobile
        card.onclick = async () => {
          await saveEvalItem(item.id, {selected_store_id: (item.product_prices[0]?.store_id || null)});
          renderMain();
          toast('נוסף לסל! 🛒');
        };
        
        gBody.append(card);
      });

      gHdr.onclick = () => gBox.classList.toggle('open');
      gBox.append(gHdr, gBody);
      list.append(gBox);
    });
  }
  
  sidebar.append(sbHdr, list);
  
  // ─── Main: Drop Zone / Cart ───
  const main = mk('div', 'eval-main');
  const mHdr = mk('div', 'eval-hdr');
  mHdr.innerHTML = '<b>סל הקניות לבדיקה</b>';
  
  const dropzone = mk('div', 'eval-dropzone');
  
  const refreshCart = () => {
    dropzone.innerHTML = '';
    let total = 0;
    let totalOriginal = 0;

    if(S.evalCart.length === 0) {
      dropzone.innerHTML = '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);text-align:center"><div style="font-size:48px;margin-bottom:12px">🛒</div><div>טרם נוספו מוצרים.<br>גרור מוצרים מהרשימה בצד לכאן.</div></div>';
    }

    S.evalCart.forEach(evalItem => {
      const item = S.items.find(i => i.id === evalItem.user_item_id);
      if(!item) return;

      const ci = mk('div', 'cart-item');
      const storePrices = (item.product_prices || []).sort((a,b) => a.price - b.price);
      
      // Top row: Info & Delete
      const top = mk('div', 'ci-top');
      const cat = getCat(item.category_id);
      const imgUrl = item.image_url || item.product_models?.image_url;
      
      const img = mk('img', 'ci-img');
      img.src = imgUrl || `https://via.placeholder.com/50?text=${cat.icon}`;
      img.onerror = () => { img.style.display='none'; };
      
      const info = mk('div', 'ci-info');
      const name = item.product_models ? (item.product_models.brands?.name + ' ' + item.product_models.model_name) : (item.custom_name || cat.he);
      info.innerHTML = `<div class="ci-name">${name}</div><div class="ci-cat">${cat.he}</div>`;
      
      const del = mkBtn('✕', 'btn bg bsm bico', async() => {
        await removeFromEval(item.id);
        renderMain();
      });
      del.style.color = 'var(--t3)';

      top.append(img, info, del);
      ci.append(top);

      // Re-ordered 3-column Layout for cart items: [Store Selector] [Options] [Price Result]
      const controls = mk('div', 'ci-controls');
      
      // Right Column: Store selection
      const storeWrap = mk('div', 'ci-store-wrap');
      const storeOpts = storePrices.map(p => [p.store_id, `${STORES[p.store_id]?.name || p.store_id} (₪${p.price.toLocaleString()})`]);
      if(storeOpts.length === 0) storeOpts.push(['', 'אין מחירים']);
      const sSel = mkSel(storeOpts, evalItem.selected_store_id || (storePrices[0]?.store_id));
      sSel.style.fontSize = '12px';
      sSel.onchange = async () => {
        await saveEvalItem(item.id, {selected_store_id: sSel.value});
        refreshCart();
      };
      storeWrap.append(sSel);
      
      // Middle Column: Eilat Toggle + Clubs
      const optsWrap = mk('div', 'ci-opts-wrap');
      
      // Modern Eilat Button
      const eBtn = mk('div', 'eilat-btn' + (evalItem.is_eilat ? ' on' : ''));
      eBtn.innerHTML = `<i>🌵</i> <span>רכישה באילת</span>`;
      eBtn.onclick = async () => {
        await saveEvalItem(item.id, {is_eilat: !evalItem.is_eilat});
        refreshCart();
      };
      optsWrap.append(eBtn);

      const clubWrap = mk('div', 'club-selector');
      S.clubs.forEach(club => {
        const isOn = evalItem.applied_club_id === club.id;
        const pill = mk('div', 'club-pill' + (isOn ? ' on' : ''));
        pill.textContent = club.name_he;
        pill.onclick = async () => {
          const newVal = isOn ? null : club.id;
          await saveEvalItem(item.id, {applied_club_id: newVal});
          refreshCart();
        };
        clubWrap.append(pill);
      });
      optsWrap.append(clubWrap);
      
      // Price Box calculation
      const priceBox = mk('div', 'ci-price-box');
      const selectedStoreId = sSel.value;
      const basePriceObj = storePrices.find(p => p.store_id === selectedStoreId);
      let basePrice = basePriceObj ? basePriceObj.price : (item.custom_price || 0);
      totalOriginal += basePrice;

      let finalPrice = basePrice;
      let discountText = "";

      if(evalItem.applied_club_id) {
        const discount = S.clubDiscounts.find(d => d.club_id === evalItem.applied_club_id && d.store_id === selectedStoreId);
        if(discount && discount.discount_percent > 0) {
          finalPrice = finalPrice * (1 - (discount.discount_percent / 100));
          discountText += `${discount.discount_percent}% הנחת מועדון`;
        }
      }

      if(evalItem.is_eilat) {
        finalPrice = finalPrice / 1.17;
        discountText += (discountText ? " + " : "") + "פטור מע\"מ";
      }

      const pVal = mk('div', 'ci-final-price');
      pVal.textContent = '₪' + finalPrice.toLocaleString('he-IL', {minimumFractionDigits: 0, maximumFractionDigits: 2});
      
      const pSave = mk('div', 'ci-savings');
      const diff = basePrice - finalPrice;
      pSave.textContent = diff > 0.01 ? `חיסכון: ₪${diff.toLocaleString('he-IL', {maximumFractionDigits: 2})} (${discountText})` : 'מחיר מלא';
      
      priceBox.append(pVal, pSave);
      
      controls.append(storeWrap, optsWrap, priceBox);

      ci.append(controls);
      dropzone.append(ci);
      
      total += finalPrice;
    });

    // Checkout / Move to Deliveries Action
    if(S.evalCart.length > 0) {
      const checkoutWrap = mk('div'); checkoutWrap.style.cssText = 'padding:20px;text-align:center;border-top:1.5px solid var(--brd);margin-top:10px';
      const checkoutBtn = mkBtn('🚀 בצע הזמנה והעבר למשלוחים', 'bp', async () => {
        if(!confirm('מוכנים להזמין את הפריטים בסל? הם יעברו ללשונית "משלוחים".')) return;
        
        const itemIds = S.evalCart.map(e => e.user_item_id);
        await sb.from('user_items').update({ is_ordered: true }).in('id', itemIds);
        
        // Refresh local state
        await loadItems();
        S.dashTab = 'delivery';
        renderDash();
        toast('🚀 הפריטים הועברו למשלוחים!');
      });
      checkoutBtn.style.padding = '12px 24px'; checkoutBtn.style.fontSize = '15px';
      checkoutWrap.append(checkoutBtn);
      dropzone.append(checkoutWrap);
    }

    const totalEl = $('eval-total');
    if(totalEl) totalEl.textContent = '₪' + total.toLocaleString('he-IL', {minimumFractionDigits: 0, maximumFractionDigits: 2});
    const saveEl = $('eval-total-save');
    if(saveEl) {
      const saving = totalOriginal - total;
      saveEl.textContent = saving > 0.01 ? `חיסכון כולל: ₪${saving.toLocaleString('he-IL', {maximumFractionDigits: 2})}` : '';
    }
  };

  dropzone.ondragover = e => { e.preventDefault(); dropzone.classList.add('over'); };
  dropzone.ondragleave = () => dropzone.classList.remove('over');
  dropzone.ondrop = async e => {
    e.preventDefault();
    dropzone.classList.remove('over');
    const itemId = e.dataTransfer.getData('text/plain');
    if(itemId) {
      const item = S.items.find(i => i.id === itemId);
      
      // Validation: Ensure the product has at least one price in the database
      const hasPrices = item?.product_prices && item.product_prices.length > 0;
      if (!hasPrices) {
        toast('לא ניתן להוסיף מוצר זה לסל הקניות כי אין לו מחירים במערכת ⚠️', true);
        return;
      }

      const bestPriceStore = (item.product_prices || []).sort((a,b)=>a.price-b.price)[0]?.store_id;
      await saveEvalItem(itemId, {selected_store_id: bestPriceStore || null});
      renderMain();
    }
  };

  main.append(mHdr, dropzone);
  
  // Sidebar on the left in RTL
  layout.append(sidebar, main);
  
  setTimeout(refreshCart, 0); // Trigger first calc
  frag.append(layout);
  return frag;
}

/* ═══════════════════════════════════════════════
   לוח ניהול (Admin)
═══════════════════════════════════════════════ */
function buildAdmin(){
  const wrap=mk('div');
  const h2=mk('h2'); h2.textContent = '⚙️ לוח ניהול'; h2.style.marginBottom = '16px'; wrap.append(h2);
  const at=mk('div','mtabs'); at.style.maxWidth = '400px';
  const tabs = [['models','📚 דגמים'],['stores','🏪 חנויות'],['clubs', '💳 מועדונים'],['users','👥 משתמשים']];
  let aTab = 'models';
  tabs.forEach(([v,l])=>{
    const b = mk('button','mtab'+(aTab===v?' on':'')); b.textContent = l;
    b.onclick=()=>{ aTab=v; tabs.forEach(([tv])=>{ const bt=at.querySelector('[data-v="'+tv+'"]'); if(bt) bt.classList.toggle('on',tv===v); }); loadTab(); };
    b.dataset.v = v; at.append(b);
  });
  wrap.append(at);
  const body = mk('div'); body.id = 'admin-body'; wrap.append(body);
  async function loadTab(){
    body.innerHTML = ''; body.style.opacity = '.4';
    if(aTab === 'models') body.append(await buildAdminModels());
    else if(aTab === 'stores') body.append(await buildAdminStores());
    else if(aTab === 'clubs') body.append(await buildAdminClubs());
    else body.append(await buildAdminUsers());
    body.style.opacity = '1';
  }
  loadTab(); return wrap;
}

async function buildAdminStores(){
  const wrap = mk('div');
  const actionsWrap = mk('div'); actionsWrap.style.cssText = 'display:flex; justify-content:space-between; align-items:center; margin-bottom:12px';
  const addBtn = mkBtn('+ הוסף חנות','bp bsm', () => openAddStoreModal(() => loadAdminStores()));
  actionsWrap.append(addBtn);
  wrap.append(actionsWrap);

  const table = mk('table','admin-table');
  const thead = mk('thead'); const hr = mk('tr');

function openAddStoreModal(onSaved){
  const d = mk('div');
  const urlInp = mkInp('url', 'הדבק קישור לדף הבית של החנות');
  const previewArea = mk('div'); previewArea.style.marginTop = '15px';

  const scrapeBtn = mkBtn('🔍 שאב פרטי חנות','bp bsm', async() => {
    const url = urlInp.value.trim();
    if(!url || !url.startsWith('http')){ toast('הזן כתובת אתר תקינה', true); return; }
    scrapeBtn.disabled = true; scrapeBtn.textContent = '⏳ שואב...';
    try {
      const { data, error } = await sb.functions.invoke('scrape-product', { body: { url }, headers: { Authorization: `Bearer ${SUPABASE_ANON}` } });
      if(error || !data) throw new Error(error?.message || 'לא התקבלו נתונים');
      const pd = data.data || data;
      
      previewArea.innerHTML = '';
      const pbox = mk('div'); pbox.style.cssText = 'padding:15px; background:var(--s2); border-radius:var(--rs); border:1px solid var(--brd)';
      const pHeader = mk('div'); pHeader.style.cssText = 'display:flex; gap:12px; align-items:center; margin-bottom:12px';
      
      const logoUrl = pd.store_logo_url || `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=128`;
      const img = mk('img'); img.src = logoUrl; img.style.cssText = 'width:48px;height:48px;object-fit:contain;background:#fff;border-radius:4px;border:1px solid var(--brd)';
      
      const nameInp = mkInp('text', 'שם החנות (עברית)', pd.store_name || '');
      const nameEnInp = mkInp('text', 'שם החנות (אנגלית)', '');
      
      pHeader.append(img);
      const inputs = mk('div'); inputs.style.flex = '1';
      inputs.append(mkFld('שם בעברית', [nameInp]), mkFld('שם באנגלית', [nameEnInp]));
      pHeader.append(inputs);
      pbox.append(pHeader);
      
      const saveBtn = mkBtn('✅ אמת ושמור חנות','bp bfw', async() => {
        const sName = nameInp.value.trim();
        const sNameEn = nameEnInp.value.trim() || sName;
        if(!sName){ toast('חובה להזין שם חנות', true); return; }
        
        const cleanUrl = new URL(url).hostname.replace('www.', '').toLowerCase();
        const derivedId = cleanUrl.replace(/[^a-z0-9]/g, '');
        saveBtn.disabled = true;
        const { error: se } = await sb.from('stores').upsert({
          id: derivedId,
          name_he: sName,
          name_en: sNameEn,
          url: new URL(url).origin,
          logo_url: logoUrl,
          active: true
        });
        if(se){ toast(se.message, true); saveBtn.disabled = false; return; }
        toast('חנות נוספה בהצלחה! 🎉'); closeModal(); if(onSaved) onSaved();
      });
      pbox.append(saveBtn);
      previewArea.append(pbox);
    } catch(e) {
      toast('שגיאה בשאיבת הפרטים: ' + e.message, true);
    } finally {
      scrapeBtn.disabled = false; scrapeBtn.textContent = '🔍 שאב פרטי חנות';
    }
  });

  d.append(mkFld('כתובת אתר החנות', [urlInp]), scrapeBtn, previewArea);
  openModal('➕ הוספת חנות חדשה', d);
}

      delBtn.disabled=true; delBtn.textContent='...';

      if(error){ toast('שגיאה: '+error.message,true); delBtn.disabled=false; delBtn.textContent='🗑️'; return; }
      tr.remove(); toast('נמחק: '+m.model_name);
      const idx=S.models.findIndex(x=>x.id===m.id); if(idx>-1) S.models.splice(idx,1);

async function buildAdminClubs(){
  const wrap = mk('div');
  const h = mk('h3'); h.style.marginBottom = '12px'; h.textContent = '💳 ניהול מועדוני צרכנות והנחות';
  wrap.append(h);

  const { data: clubs } = await sb.from('buying_clubs').select('*').order('name_he');
  const { data: stores } = await sb.from('stores').select('*').order('name_he');
  const { data: discounts } = await sb.from('club_discounts').select('*');

  const table = mk('table', 'admin-table');
  const thead = mk('thead'); const hr = mk('tr');
  hr.append(mk('th')); // Club name
  stores.forEach(s => { 
    const th = mk('th'); th.textContent = s.name_he; th.style.fontSize = '9px'; 
    hr.append(th); 
  });
  thead.append(hr); table.append(thead);

  const tbody = mk('tbody');
  clubs.forEach(club => {
    const tr = mk('tr');
    const nameTd = mk('td'); nameTd.style.fontWeight = '700'; nameTd.textContent = club.name_he;
    tr.append(nameTd);

    stores.forEach(store => {
      const td = mk('td');
      const discount = discounts.find(d => d.club_id === club.id && d.store_id === store.id);
      const val = discount ? discount.discount_percent : 0;

      const inp = mkInp('number', '0%', val);
      inp.style.width = '55px'; inp.style.fontSize = '11px'; inp.style.padding = '4px';
      
      inp.onchange = async () => {
        const newPct = parseFloat(inp.value) || 0;
        inp.disabled = true;
        
        if(newPct === 0 && discount) {
          await sb.from('club_discounts').delete().eq('id', discount.id);
        } else {
          await sb.from('club_discounts').upsert({
            club_id: club.id,
            store_id: store.id,
            discount_percent: newPct
          }, { onConflict: 'club_id,store_id' });
        }
        
        // Refresh local state for immediate sync
        const { data: updated } = await sb.from('club_discounts').select('*');
        S.clubDiscounts = updated || [];
        
        inp.disabled = false;
        toast(`עודכן: ${club.name_he} ב-${store.name_he}`);
      };

      td.append(inp);
      tr.append(td);
    });
    tbody.append(tr);
  });

  table.append(tbody);
  wrap.append(table);
  return wrap;
}

  const karinNote=mkInp('text','',m.karin_note||'');
  const chkRow=mk('div'); chkRow.style.cssText='display:flex;gap:18px;margin-bottom:10px';
  const kl=mk('label'); kl.style.cssText='font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer'; kl.append(karinChk,tx('⭐ המלצת קרין'));
  const al=mk('label'); al.style.cssText='font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer'; al.append(activeChk,tx('✅ פעיל'));
  chkRow.append(kl,al);

  const r=mk('div'); r.style.cssText='display:flex;gap:8px;justify-content:flex-end;margin-top:12px';
  r.append(mkBtn('ביטול','bs bsm',closeModal));
  r.append(mkBtn('💾 שמור שינויים','bp bsm',async()=>{
    const {error}=await sb.from('product_models').update({
        model_name:nameInp.value.trim(),
        image_url:imgUrlInp.value.trim()||null, product_url:prodUrlInp.value.trim()||null,
        price_range_low:Number(pLow.value)||null, price_range_high:Number(pHigh.value)||null,
        is_karin_pick:karinChk.checked, karin_note:karinNote.value.trim()||null,
        active:activeChk.checked, updated_at:new Date().toISOString()
    }).eq('id',m.id);
    if(error){ toast(error.message,true); return; }
    toast('עודכן! ✅'); closeModal();
    const {data:models}=await sb.from('product_models').select('*, brands(name)').eq('active',true).order('is_karin_pick',{ascending:false});
    S.models=models||[];
    if(onSaved) onSaved();
  }));

  d.append(
    mkFld('שם דגם',[nameInp]),
    mkFld('קישור רשמי + שאיבת מידע',[]),
    urlRow,
    mkFld('קישור לתמונה',[imgUrlInp]),
    pr, chkRow, mkFld('הערת קרין',[karinNote]), r
  );
  openModal('✏️ עריכה: '+(m.brands?.name||'')+' '+m.model_name, d);
}

/* ═══════════════════════════════════════════════
   הגדרות
═══════════════════════════════════════════════ */
function openSettings(){
  const d=mk('div');
  const wp=mkWeekPicker(S.profile?.preg_week,S.profile?.preg_days);
  const r=mk('div'); r.style.cssText='display:flex;gap:8px;justify-content:flex-end;margin-top:12px';
  r.append(mkBtn('ביטול','bs bsm',closeModal));
  r.append(mkBtn('שמור','bp bsm',async()=>{
    const w=wp.getW(), x=wp.getD();
    if(!w||w<1||w>42){ toast('שבוע לא תקין',true); return; }
    const updates={preg_week:w,preg_days:x,due_date:calcDue(w,x)};
    await sb.from('profiles').update(updates).eq('id',S.user.id);
    Object.assign(S.profile,updates); closeModal(); renderDash(); toast('נשמר!');
  }));
  d.innerHTML=''; const htitle=mk('div'); htitle.style.cssText='font-size:13px;font-weight:700;margin-bottom:10px'; htitle.textContent='🤰 שלב ההריון'; d.append(htitle,wp.node,r);
  openModal('⚙️ הגדרות',d);
}

/* ═══════════════════════════════════════════════
   אתחול
═══════════════════════════════════════════════ */
(async function boot(){
  S.authMode='login';
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    S.user=session.user;
    const {data:profile}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
    if(profile){ S.profile=profile; await afterLogin(); return; }
  }
  renderAuth();
}());
</script>
